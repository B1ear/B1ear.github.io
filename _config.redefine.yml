# BASIC INFORMATION
info:
  title: B1ear
  subtitle: ""
  author: B1ear
  url: https://B1ear.github.io

# IMAGE
defaults:
  avatar: /images/avatar.jpg
  favicon: /images/avatar.jpg

# ARTICLES
articles:
  author_label:
    enable: false

# COMMENT
comment:
  enable: false

# HOME BANNER
home_banner:
  enable: true
  style: fixed
  image:
    light: /images/bg.jpg
    dark: /images/bg.jpg
  title: B1ear's Security Blog
  subtitle:
    text:
      - "Pwn | Web | CTF Writeups"
      - "Binary Exploitation"
      - "Security Research"
      - "Capture The Flag"
    typing_speed: 80
    backing_speed: 40
    starting_delay: 800
    backing_delay: 2000
    loop: true
  text_color:
    light: "#fff"
    dark: "#d1d1b6"
  social_links:
    enable: true
    style: default
    links:
      - icon: github
        url: https://github.com/B1ear
      - icon: email
        url: b1earr@163.com

# NAVIGATION BAR
navbar:
  color:
    left: "transparent"
    right: "transparent"
    transparency: 10
  links:
    Home:
      path: /
      icon: fa-regular fa-house
    Archives:
      path: /archives
      icon: fa-regular fa-archive
    Categories:
      path: /categories
      icon: fa-regular fa-folder
    Tags:
      path: /tags
      icon: fa-regular fa-tags

# FOOTER
footer:
  runtime: false
  statistics: false
  icon: '<i class="fa-solid fa-lollipop"></i>'
  start: ""

# GLOBAL
global:
  website_counter:
    enable: false

# INJECT
# home-banner-background: 首页背景图模糊，5px为模糊半径
# navbar-content.has-home-banner: 导航栏文字颜色（淡黄 #fffde7）
# .markdown-body h1-h6: 内容区各级标题字号 (rem单位，1rem≈16px)
#   h1: 1.35rem, h2: 1.1rem, h3: 1.05rem, h4: 1rem
# article-title-regular/cover: 文章页标题字号 3.0rem，!important强制覆盖主题默认值
inject:
  enable: true
  head:
    - "<style>.home-banner-background{filter:blur(5px)}.navbar-content.has-home-banner{--first-text-color:#fffde7;--default-text-color:#fffde7}.home-banner-container .description{font-size:3.5rem;text-shadow:2px 2px 8px rgba(0,0,0,0.5)}.home-banner-container .description p i{font-size:1.5rem;text-shadow:1px 1px 4px rgba(0,0,0,0.3)}.home-banner-container .content{margin-bottom:2rem}.social-contacts .social-contact-item.email~.social-contact-item.email{display:none!important}.article-content.markdown-body h1{font-size:2.5rem!important}.article-content.markdown-body h2{font-size:2.0rem!important}.article-content.markdown-body h3{font-size:1.5rem!important}.article-content.markdown-body h4{font-size:1rem!important}.article-title-regular{font-size:3.0rem!important}.article-title-cover{font-size:3.0rem!important}</style>"
    - "<script>document.addEventListener('DOMContentLoaded',function(){document.title=document.title.replace(/ - .*/,'')})</script>"

# PLUGINS
plugins:
  mathjax:
    enable: true
